<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <div class="container">

            <div id="timer">
                00:00:00
            </div>

            <div class="buttons">
                <button id="startStopBtn">
                    <i class="fa-solid fa-play" id="play"><img class="img-btn" src="Image/play-btn.svg" alt="play"></i>
                </button>

                <button id="resetBtn">
                    <i class="fa-solid fa-arrow" id="reset"><img class="img-btn" src="Image/reset-btn.svg" alt=""></i>
                </button>
            </div>

        </div>

        <script src="app.js"></script>
    </body>
</html>
